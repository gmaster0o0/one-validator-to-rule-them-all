<div
  class="preview flex min-h-[350px] flex-col w-full justify-center px-4 lg:px-10 py-10 items-center style-vega"
>
  <section class="w-full max-w-sm" hlmCard>
    <div hlmCardHeader>
      <h3 hlmCardTitle>Login to your account</h3>
      <p hlmCardDescription class="text-xs text-muted-foreground">Autofill:</p>
      <div class="flex flex-wrap gap-2 items-center">
        <button
          type="button"
          hlmBtn
          variant="outline"
          class="text-[10px] px-1 py-1"
          (click)="fillValidCredentials()"
        >
          <ng-icon hlm name="lucideCheck" size="sm" />
          Valid credential
        </button>
        <button
          type="button"
          hlmBtn
          variant="outline"
          class="text-[10px] px-1 py-1"
          (click)="fillInvalidCredentials()"
        >
          <ng-icon hlm name="lucideX" size="sm" />
          Invalid credential
        </button>
        <button
          type="button"
          hlmBtn
          variant="outline"
          class="text-[10px] px-1 py-1"
          (click)="fillInvalidEmail()"
        >
          <ng-icon hlm name="lucideMailX" size="sm" />
          Invalid email
        </button>
      </div>
    </div>

    <div hlmCardContent>
      <form [formRoot]="loginForm" id="loginFormId">
        <div hlm-field class="flex flex-col gap-6">
          <div class="grid gap-2">
            <label hlmLabel for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Admin@example.com"
              [formField]="loginForm.email"
              hlmInput
            />
          </div>
          <div class="grid gap-2">
            <div class="flex items-center">
              <label hlmLabel for="password">Password</label>
            </div>
            <input
              [formField]="loginForm.password"
              type="password"
              id="password"
              hlmInput
            />
          </div>
        </div>
      </form>
    </div>

    <div hlmCardFooter class="flex-col gap-2">
      <button
        hlmBtn
        type="submit"
        form="loginFormId"
        [disabled]="loginForm().pending() || loginForm().invalid()"
        class="w-full"
      >
        {{ loginStatus.status() === 'loading' ? 'Login...' : 'Login' }}
      </button>
    </div>
  </section>
  <app-debug-panel
    class="w-full max-w-sm"
    [data]="loginData()"
    [form]="loginForm()"
    [backendResponse]="backendResponse()"
    [backendStatus]="loginStatus.status()"
  ></app-debug-panel>
</div>
