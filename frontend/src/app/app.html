<div
  class="preview flex min-h-[350px] w-full justify-center px-4 lg:px-10 py-10 items-center style-vega"
>
  <section class="w-full max-w-sm" hlmCard>
    <div hlmCardHeader>
      <h3 hlmCardTitle>Login to your account</h3>
      <p hlmCardDescription>Enter your email below to login to your account</p>
    </div>

    <div hlmCardContent>
      <form>
        <div hlm-field class="flex flex-col gap-6">
          <div class="grid gap-2">
            <label hlmLabel for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="m@example.com"
              required
              hlmInput
            />
          </div>
          <hlm-field-error validator="required"
            >Title is a required field.</hlm-field-error
          >

          <div class="grid gap-2">
            <div class="flex items-center">
              <label hlmLabel for="password">Password</label>
            </div>
            <input type="password" id="password" hlmInput />
          </div>
        </div>
      </form>
    </div>

    <div hlmCardFooter class="flex-col gap-2">
      <button hlmBtn type="submit" class="w-full">Login</button>
    </div>
  </section>
</div>
